<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GhostNet v8 - Web4 Social</title>

<script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>

<style>
body { background:#050507; color:white; font-family:monospace; margin:0; text-align:center; }
.card { background:#111; padding:20px; margin:10px auto; width:90%; max-width:400px; border-radius:10px; }
input, textarea {
    width:100%; padding:10px; margin:5px 0;
    background:#000; color:#00f3ff; border:1px solid #333;
}
button { padding:10px; margin:5px; cursor:pointer; }
.post { background:#111; margin:10px; padding:10px; border-left:3px solid cyan; }
.hidden { display:none; }
img { border-radius:50%; }
</style>
</head>

<body>

<div id="auth" class="card">
<h2>👻 GhostNet v8</h2>
<div id="status">MESH: CONNECTING...</div>

<input id="user" placeholder="username">
<input id="pass" type="password" placeholder="password">

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<div id="console"></div>
</div>

<div id="app" class="hidden">
<h3 id="nickname"></h3>

<div class="card">
<input id="avatar" placeholder="Avatar Image URL">
<input id="bio" placeholder="Bio">
<button onclick="saveProfile()">Save Profile</button>
</div>

<div class="card">
<textarea id="msg" placeholder="What's happening?"></textarea>
<button onclick="post()">Post</button>
</div>

<div id="feed"></div>

<button onclick="logout()">Logout</button>
</div>

<script>
// MULTI PEER
const gun = Gun({
    peers: [
        'https://gun-manhattan.herokuapp.com/gun',
        'https://peer.wallie.io/gun',
        'https://gun-us.herokuapp.com/gun'
    ],
    localStorage:true
});

const user = gun.user();

const log = (m)=>document.getElementById('console').innerHTML += "<br>"+m;

// PEER STATUS
gun.on('hi', ()=> {
    document.getElementById('status').innerText="MESH: ONLINE";
});

// REGISTER
function register(){
    user.create(userVal(), passVal(), ack=>{
        if(ack.err){ alert(ack.err); log(ack.err); }
        else alert("Account created. Now login.");
    });
}

// LOGIN
function login(){
    user.auth(userVal(), passVal(), ack=>{
        if(ack.err){ alert("Login Failed"); }
        else startApp();
    });
}

// START APP
function startApp(){
    document.getElementById('auth').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');

    loadProfile();
    loadFeed();
}

// PROFILE
function saveProfile(){
    gun.get('profiles').get(user.is.pub).put({
        nickname:userVal(),
        avatar:document.getElementById('avatar').value,
        bio:document.getElementById('bio').value
    });
}

function loadProfile(){
    gun.get('profiles').get(user.is.pub).on(data=>{
        if(!data) return;
        document.getElementById('nickname').innerText="@"+(data.nickname||"anon");
    });
}

// POST
function post(){
    const id = Gun.text.random();
    gun.get('posts').get(id).put({
        id,
        user:userVal(),
        pub:user.is.pub,
        msg:document.getElementById('msg').value,
        time:Date.now()
    });
    document.getElementById('msg').value='';
}

// FEED
function loadFeed(){
    gun.get('posts').map().on((data,id)=>{
        if(!data || document.getElementById(id)) return;

        const div=document.createElement('div');
        div.className='post';
        div.id=id;

        div.innerHTML=`
        <b>@${data.user}</b>
        <p>${data.msg}</p>
        <button onclick="like('${id}')">👍</button>
        <button onclick="share('${id}')">🔁</button>
        <input id="c-${id}" placeholder="comment">
        <button onclick="comment('${id}')">💬</button>
        <div id="comments-${id}"></div>
        `;

        document.getElementById('feed').prepend(div);

        // COMMENTS LOAD
        gun.get('comments').get(id).map().on(c=>{
            if(!c) return;
            const el=document.createElement('div');
            el.innerText = c.user + ": " + c.msg;
            document.getElementById('comments-'+id).appendChild(el);
        });
    });
}

// LIKE
function like(id){
    gun.get('likes').get(id).get(user.is.pub).put(true);
}

// COMMENT
function comment(id){
    const txt=document.getElementById('c-'+id).value;
    gun.get('comments').get(id).set({
        user:userVal(),
        msg:txt,
        time:Date.now()
    });
}

// SHARE (REPOST)
function share(id){
    gun.get('posts').get(id).once(data=>{
        postShared(data.msg);
    });
}

function postShared(msg){
    const id = Gun.text.random();
    gun.get('posts').get(id).put({
        user:userVal(),
        msg:"🔁 "+msg,
        time:Date.now()
    });
}

// FOLLOW
function follow(pub){
    gun.get('follows').get(user.is.pub).get(pub).put(true);
}

// LOGOUT
function logout(){
    user.leave();
    location.reload();
}

// HELPERS
function userVal(){ return document.getElementById('user').value; }
function passVal(){ return document.getElementById('pass').value; }

// AUTO LOGIN
gun.on('auth', ()=> startApp());

</script>

</body>
</html>
