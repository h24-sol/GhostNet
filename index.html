<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOSTNET // WEB4 FINAL</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>
    <style>
        :root { --neon: #00f3ff; --ghost: #bc13fe; --dark: #050507; --panel: #111115; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        .nav { width: 100%; padding: 15px 25px; border-bottom: 1px solid var(--neon); display: flex; justify-content: space-between; align-items: center; background: #000; box-sizing: border-box; }
        
        /* Fixed Auth UI */
        .auth-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; }
        .auth-card { background: var(--panel); padding: 30px; border-radius: 20px; width: 350px; border: 1px solid #222; text-align: center; }
        
        .tab-box { display: flex; margin-bottom: 20px; border-bottom: 1px solid #222; }
        .tab { flex: 1; padding: 10px; cursor: pointer; color: #666; }
        .tab.active { color: var(--neon); border-bottom: 2px solid var(--neon); font-weight: bold; }

        /* Main App */
        .app-container { display: none; padding: 20px; max-width: 800px; margin: 0 auto; }
        .post-box { background: var(--panel); padding: 20px; border-radius: 15px; border: 1px solid var(--ghost); margin-bottom: 20px; }
        .post { background: #1a1a20; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid var(--neon); }

        /* Components */
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-reg { background: var(--ghost); color: white; }
        .btn-log { background: var(--neon); color: black; }
        
        .hidden { display: none; }
        .key-box { font-size: 10px; color: var(--neon); background: #000; padding: 10px; border-radius: 5px; word-break: break-all; margin-top: 10px; }
    </style>
</head>
<body>

<div class="nav">
    <div style="font-weight: 900; letter-spacing: 2px;">GHOSTNET <span style="font-size:10px; color:var(--ghost)">v4.0</span></div>
    <div id="node-count" style="color:var(--neon); font-size:12px;">MESH ONLINE</div>
</div>

<div id="auth-layer" class="auth-wrapper">
    <div class="auth-card">
        <div class="tab-box">
            <div id="t1" class="tab active" onclick="switchTab('reg')">REGISTER</div>
            <div id="t2" class="tab" onclick="switchTab('log')">LOGIN</div>
        </div>

        <div id="reg-section">
            <input type="text" id="r-user" placeholder="Create Username">
            <input type="password" id="r-pass" placeholder="Create Password">
            <button class="btn-reg" onclick="doRegister()">CREATE WEB4 ACCOUNT</button>
        </div>

        <div id="log-section" class="hidden">
            <input type="text" id="l-user" placeholder="Username">
            <input type="password" id="l-pass" placeholder="Password">
            <button class="btn-log" onclick="doLogin()">ACCESS MESH</button>
        </div>
    </div>
</div>

<div id="app-layer" class="app-container">
    <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
        <h2 id="welcome-msg">Welcome</h2>
        <button onclick="location.reload()" style="width:auto; padding:5px 15px; background:#400;">Logout</button>
    </div>

    <div class="post-box">
        <textarea id="msg-input" style="width:100%; height:80px; background:#000; color:white; border:1px solid #333; border-radius:8px; padding:10px;" placeholder="What's on your mind?"></textarea>
        <button class="btn-log" onclick="sendPost()">BROADCAST TO PEERS</button>
    </div>

    <div id="feed"></div>
</div>

<script>
    // 1. Setup GunDB
    const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
    const user = gun.user();

    // 2. Tab Switching Logic
    function switchTab(mode) {
        if(mode === 'reg') {
            document.getElementById('reg-section').classList.remove('hidden');
            document.getElementById('log-section').classList.add('hidden');
            document.getElementById('t1').classList.add('active');
            document.getElementById('t2').classList.remove('active');
        } else {
            document.getElementById('reg-section').classList.add('hidden');
            document.getElementById('log-section').classList.remove('hidden');
            document.getElementById('t1').classList.remove('active');
            document.getElementById('t2').classList.add('active');
        }
    }

    // 3. Register Function
    function doRegister() {
        const u = document.getElementById('r-user').value;
        const p = document.getElementById('r-pass').value;
        if(!u || !p) return alert("Enter User/Pass");

        user.create(u, p, (ack) => {
            if(ack.err) {
                alert("Error: " + ack.err);
            } else {
                alert("Account Created! You can now LOGIN.");
                switchTab('log');
            }
        });
    }

    // 4. Login Function
    function doLogin() {
        const u = document.getElementById('l-user').value;
        const p = document.getElementById('l-pass').value;

        user.auth(u, p, (ack) => {
            if(ack.err) {
                alert("Login Failed: " + ack.err);
            } else {
                launchApp();
            }
        });
    }

    // 5. Launch App UI
    function launchApp() {
        document.getElementById('auth-layer').style.display = 'none';
        document.getElementById('app-layer').style.display = 'block';
        document.getElementById('welcome-msg').innerText = "Citizen: " + user.is.alias;
        loadFeed();
    }

    // 6. Messaging / Social
    function sendPost() {
        const txt = document.getElementById('msg-input').value;
        if(!txt) return;

        gun.get('ghostnet_master_v4').set({
            name: user.is.alias,
            msg: txt,
            time: Date.now()
        });
        document.getElementById('msg-input').value = '';
    }

    // 7. Load Feed (Real-time)
    function loadFeed() {
        const feed = document.getElementById('feed');
        gun.get('ghostnet_master_v4').map().once((data, id) => {
            if(!data || !data.msg) return;
            const item = document.createElement('div');
            item.className = 'post';
            item.innerHTML = `
                <div style="color:var(--neon); font-size:12px; font-weight:bold;">@${data.name}</div>
                <div style="margin:10px 0;">${data.msg}</div>
                <div style="font-size:10px; color:#555;">${new Date(data.time).toLocaleTimeString()}</div>
            `;
            feed.prepend(item);
        });
    }

    // Check for existing session
    if(user.is) launchApp();

</script>
</body>
</html>
