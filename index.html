<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOSTNET // WEB4 OS</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>
    <style>
        :root { --neon: #00f3ff; --ghost: #bc13fe; --dark: #050507; --panel: #111115; --text: #e0e0e0; }
        body { background: var(--dark); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Navigation */
        .nav { padding: 15px 25px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; background: #000; z-index: 100; }
        .logo { font-weight: 900; letter-spacing: 3px; color: white; }
        .node-tag { font-size: 10px; color: var(--neon); border: 1px solid var(--neon); padding: 2px 8px; border-radius: 10px; }

        /* Auth Screen */
        #auth-layer { position: fixed; inset: 0; background: var(--dark); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--panel); padding: 40px; border-radius: 24px; width: 350px; border: 1px solid #222; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.7); }
        
        /* Main Layout */
        .app-grid { display: grid; grid-template-columns: 280px 1fr 300px; height: calc(100vh - 60px); }
        .sidebar { border-right: 1px solid #222; padding: 20px; overflow-y: auto; background: #08080a; }
        .feed-area { padding: 20px; overflow-y: auto; scroll-behavior: smooth; }
        .chat-area { border-left: 1px solid #222; padding: 20px; background: #08080a; }

        /* Components */
        .card { background: var(--panel); border: 1px solid #222; border-radius: 16px; padding: 15px; margin-bottom: 20px; }
        .post { border-bottom: 1px solid #222; padding: 20px 0; animation: fadeIn 0.5s ease; }
        .avatar { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(45deg, var(--ghost), var(--neon)); }
        
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 5px; }
        .btn-neon { background: var(--neon); color: black; }
        .btn-ghost { background: var(--ghost); color: white; }
        .btn-outline { background: transparent; border: 1px solid #444; color: #888; font-size: 12px; }
        
        .key-text { font-family: monospace; font-size: 9px; color: var(--neon); word-break: break-all; background: #000; padding: 10px; border-radius: 8px; margin: 10px 0; }
        .hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="auth-layer">
    <div class="auth-card">
        <h2 class="logo">GHOST<span style="color:var(--neon)">NET</span></h2>
        <div id="reg-ui">
            <input type="text" id="r-user" placeholder="Choose Alias">
            <input type="password" id="r-pass" placeholder="Master Phrase">
            <button class="btn-ghost" onclick="register()">CREATE IDENTITY</button>
            <p style="font-size: 11px; color: #555; cursor:pointer" onclick="toggleAuth()">Already a Citizen? Login</p>
        </div>
        <div id="log-ui" class="hidden">
            <input type="text" id="l-user" placeholder="Alias">
            <input type="password" id="l-pass" placeholder="Master Phrase">
            <button class="btn-neon" onclick="login()">ENTER MESH</button>
            <p style="font-size: 11px; color: #555; cursor:pointer" onclick="toggleAuth()">New here? Register</p>
        </div>
    </div>
</div>

<div class="nav">
    <div class="logo">GHOSTNET</div>
    <div class="node-tag">NODES ONLINE: <span id="n-count">1</span></div>
</div>

<div class="app-grid">
    <div class="sidebar">
        <div class="card" style="text-align:center">
            <div class="avatar" style="width:80px; height:80px; margin: 0 auto 15px auto;"></div>
            <h3 id="u-name">User</h3>
            <p style="font-size:12px; color:#666">Web4 Verified</p>
        </div>
        
        <div class="card">
            <h4 style="margin:0 0 10px 0; font-size:12px; color:var(--neon)">PUBLIC ID (Address)</h4>
            <div class="key-text" id="pub-key">Generating...</div>
            
            <h4 style="margin:15px 0 10px 0; font-size:12px; color:var(--ghost)">ENCRYPTION KEY</h4>
            <div class="key-text">AES-256 Enabled</div>
            <button class="btn-outline" onclick="copyKey()">COPY PUBLIC ID</button>
        </div>
    </div>

    <div class="feed-area">
        <div class="card">
            <textarea id="post-input" placeholder="Broadcast to the decentralized world..."></textarea>
            <button class="btn-neon" onclick="sendPost()">BROADCAST</button>
        </div>
        <div id="feed-wall"></div>
    </div>

    <div class="chat-area">
        <h3 style="font-size:14px; margin-bottom:20px;">ENCRYPTED MESSAGES</h3>
        <div id="chat-box" style="height: 300px; overflow-y:auto; font-size:13px; margin-bottom:10px;">
            <p style="color:#444">Select a peer to message...</p>
        </div>
        <input type="text" id="target-pub" placeholder="Receiver Public ID">
        <textarea id="chat-input" placeholder="Encrypted message..." style="height:60px;"></textarea>
        <button class="btn-ghost" onclick="sendDirect()">SEND P2P</button>
    </div>
</div>

<script>
    // 1. Initialize Decentralized Mesh
    const gun = Gun(['https://gun-manhattan.herokuapp.com/gun', 'https://peer.wall.org/gun']);
    const user = gun.user().recall({stickyness: true});

    // 2. Auth Logic
    function toggleAuth() {
        document.getElementById('reg-ui').classList.toggle('hidden');
        document.getElementById('log-ui').classList.toggle('hidden');
    }

    async function register() {
        const u = document.getElementById('r-user').value;
        const p = document.getElementById('r-pass').value;
        user.create(u, p, (ack) => {
            if(ack.err) return alert(ack.err);
            alert("Identity Created. Now Login.");
            toggleAuth();
        });
    }

    function login() {
        const u = document.getElementById('l-user').value;
        const p = document.getElementById('l-pass').value;
        user.auth(u, p, (ack) => {
            if(ack.err) return alert("Fail: " + ack.err);
            initApp();
        });
    }

    function initApp() {
        document.getElementById('auth-layer').style.display = 'none';
        document.getElementById('u-name').innerText = user.is.alias;
        document.getElementById('pub-key').innerText = user.is.pub;
        renderFeed();
        listenMessages();
    }

    // 3. Global Feed Logic (Like, Comment, Share)
    function sendPost() {
        const txt = document.getElementById('post-input').value;
        if(!txt) return;
        gun.get('ghostnet_v5_global').set({
            author: user.is.alias,
            pub: user.is.pub,
            body: txt,
            time: Date.now(),
            likes: 0
        });
        document.getElementById('post-input').value = '';
    }

    function renderFeed() {
        const wall = document.getElementById('feed-wall');
        gun.get('ghostnet_v5_global').map().once((data, id) => {
            if(!data || !data.body) return;
            const post = document.createElement('div');
            post.className = 'post';
            post.innerHTML = `
                <div style="display:flex; gap:10px; align-items:center">
                    <div class="avatar" style="width:30px; height:30px"></div>
                    <div style="font-weight:bold; font-size:14px;">@${data.author}</div>
                </div>
                <p style="margin: 15px 0; line-height:1.5">${data.body}</p>
                <div style="display:flex; gap:20px; font-size:12px; color:#666">
                    <span onclick="like('${id}')" style="cursor:pointer">⚡ Like (${data.likes || 0})</span>
                    <span style="cursor:pointer">💬 Comment</span>
                    <span style="cursor:pointer">🔗 Share</span>
                </div>
            `;
            wall.prepend(post);
        });
    }

    // 4. Encrypted Messaging Logic
    async function sendDirect() {
        const target = document.getElementById('target-pub').value;
        const msg = document.getElementById('chat-input').value;
        if(!target || !msg) return;

        // Encrypt message for target's public key
        const secret = await Gun.SEA.encrypt(msg, await gun.user(target).get('epub'));
        gun.user(target).get('inbox').set({ from: user.is.pub, data: secret });
        document.getElementById('chat-input').value = '';
        alert("Encrypted & Sent!");
    }

    function listenMessages() {
        user.get('inbox').map().once(async (data) => {
            const dec = await Gun.SEA.decrypt(data.data, user._.sea);
            const msgItem = document.createElement('div');
            msgItem.style = "background:#1a1a1a; padding:10px; border-radius:8px; margin-bottom:5px;";
            msgItem.innerHTML = `<strong>From ${data.from.substring(0,8)}:</strong><br>${dec}`;
            document.getElementById('chat-box').appendChild(msgItem);
        });
    }

    function copyKey() {
        navigator.clipboard.writeText(user.is.pub);
        alert("Public ID Copied!");
    }

    if(user.is) initApp();
</script>
</body>
</html>
